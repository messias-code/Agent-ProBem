# EXEMPLOS DE SAÍDA (FEW-SHOT LEARNING)
exemplos_saida:

  riaf_matricula_normalizada_sucesso:
    matricula_aluno: { conteudo: '3922024', valido: 1 } # Input era RA392-2024, limpo virou 3922024. Sucesso.
    status: { conteudo: 'valido', valido: 1 }

  riaf_beneficios_escalonamento_dinamico_invalido:
    valor_outros_beneficios: { conteudo: '556.00', valido: 0 } # Doc tem 556.00, Input era 556.10 = Divergiu
    inconsistencias: { conteudo: 'Valor de outros benefícios diverge do sistema', valido: 0 } # Erro nivel medio disparado
    status: { conteudo: 'invalido', valido: 0 } # Status travado por campo condicional

  riaf_beneficios_ausentes_sucesso:
    valor_outros_beneficios: { conteudo: '', valido: 0 } # Não tem no doc = Soft fail silencioso
    inconsistencias: { conteudo: 'Sem inconsistências', valido: 1 } 
    status: { conteudo: 'valido', valido: 1 } # Passou perfeitamente

  riaf_nome_abreviado_nao_trava_status:
    nome_aluno: { conteudo: 'JOAO P SILVA', valido: 0 } # Diverge do input JOAO PEDRO SILVA (Nível Baixo)
    inconsistencias: { conteudo: 'Nome do aluno diverge do sistema', valido: 0 }
    status: { conteudo: 'valido', valido: 1 } # O status global NÃO é afetado por campos desejáveis
